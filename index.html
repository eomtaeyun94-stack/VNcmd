<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Noto Sans KR',sans-serif;
    background:radial-gradient(circle at top,#1f2235,#0e0f17 70%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

/* 전체 카드 글로우 */
.page{
    width:400px;
    background:#141624;
    border-radius:20px;
    padding:40px;
    box-shadow:
        0 0 25px rgba(88,101,242,.3),
        0 0 80px rgba(88,101,242,.15);
    transition:.3s;
}
.page:hover{
    box-shadow:
        0 0 35px rgba(88,101,242,.5),
        0 0 120px rgba(88,101,242,.25);
}

.panel-title{
    font-size:26px;
    font-weight:700;
    margin-bottom:8px;
    text-shadow:0 0 10px rgba(88,101,242,.6);
}
.panel-sub{
    font-size:14px;
    color:#aaa;
    margin-bottom:25px;
}

.input-wrap{
    position:relative;
    margin-bottom:18px;
}

.inp{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e2033;
    color:#fff;
    transition:.25s;
}

.inp:focus{
    outline:none;
    box-shadow:0 0 15px rgba(88,101,242,.7);
}

/* 비번 일치 글로우 */
.match{
    box-shadow:0 0 15px #00ff88 !important;
}
.no-match{
    box-shadow:0 0 15px #ff3c3c !important;
}

.btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#5865f2;
    color:#fff;
    cursor:pointer;
    margin-top:10px;
    transition:.25s;
    box-shadow:0 0 15px rgba(88,101,242,.5);
}
.btn-primary:hover{
    box-shadow:0 0 25px rgba(88,101,242,.8);
    transform:translateY(-2px);
}

.switch-link{
    margin-top:15px;
    text-align:center;
    font-size:13px;
}
.switch-link span{
    color:#5865f2;
    cursor:pointer;
    text-shadow:0 0 8px rgba(88,101,242,.8);
}

.field-error{
    color:#ff5c5c;
    font-size:12px;
    margin-bottom:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<!-- 로그인 -->
<div id="login-panel">
<div class="panel-title">로그인</div>
<div class="panel-sub">다시 만나서 반가워요</div>

<div class="input-wrap">
<input id="login-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="login-pw" class="inp" type="password" placeholder="비밀번호">
</div>

<div id="login-error" class="field-error hidden"></div>
<button class="btn-primary" onclick="login()">로그인</button>

<div class="switch-link">
계정이 없으신가요? <span onclick="goTo('register')">회원가입</span>
</div>
</div>

<!-- 회원가입 -->
<div id="register-panel" class="hidden">
<div class="panel-title">회원가입</div>
<div class="panel-sub">새 계정을 만들어보세요</div>

<div class="input-wrap">
<input id="reg-name" class="inp" placeholder="이름">
</div>

<div class="input-wrap">
<input id="reg-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="reg-pw" class="inp" type="password" placeholder="비밀번호">
</div>

<div class="input-wrap">
<input id="reg-pw2" class="inp" type="password" placeholder="비밀번호 확인">
</div>

<div id="reg-error" class="field-error hidden"></div>
<button class="btn-primary" onclick="register()">가입하기</button>

<div class="switch-link">
이미 계정이 있으신가요? <span onclick="goTo('login')">로그인</span>
</div>
</div>

</div>

<script>

function goTo(type){
    document.getElementById("login-panel").classList.toggle("hidden", type!=="login");
    document.getElementById("register-panel").classList.toggle("hidden", type!=="register");
}

/* 🔥 실시간 비번 일치 체크 */
const pw1 = document.getElementById("reg-pw");
const pw2 = document.getElementById("reg-pw2");

pw2.addEventListener("input", ()=>{
    if(pw2.value === "") {
        pw2.classList.remove("match","no-match");
        return;
    }
    if(pw1.value === pw2.value){
        pw2.classList.add("match");
        pw2.classList.remove("no-match");
    }else{
        pw2.classList.add("no-match");
        pw2.classList.remove("match");
    }
});

function register(){
    const name=reg-name.value;
    const email=reg-email.value;
    const pw=reg-pw.value;
    const pw2v=reg-pw2.value;

    if(!name||!email||!pw){
        alert("모든 항목을 입력하세요.");
        return;
    }

    if(pw!==pw2v){
        alert("비밀번호가 일치하지 않습니다.");
        return;
    }

    alert("회원가입 완료!");
    goTo("login");
}

function login(){
    alert("로그인 기능은 데모입니다.");
}

</script>

</body>
</html>
