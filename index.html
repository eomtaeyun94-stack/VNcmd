<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Access</title>

<style>
body{
    margin:0;
    background:#0f1115;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#181c24;
    padding:40px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
    margin-bottom:20px;
    font-size:22px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#242a36;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#4752c4;
}

.status{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <h1>서비스 접속</h1>

    <input type="text" id="username" placeholder="아이디">
    <input type="password" id="password" placeholder="비밀번호">

    <button onclick="login()">로그인</button>

    <div class="status" id="status"></div>
</div>

<script>

// ⚠️ 테스트용 가짜 데이터
// 실제 운영은 서버에서 처리해야 함
const users = {
    "buyer1": { password: "1234", approved: true },
    "buyer2": { password: "1234", approved: false }
};

function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    if(!users[username]){
        status.innerHTML = "존재하지 않는 계정입니다.";
        status.style.color = "red";
        return;
    }

    if(users[username].password !== password){
        status.innerHTML = "비밀번호가 틀렸습니다.";
        status.style.color = "red";
        return;
    }

    if(!users[username].approved){
        status.innerHTML = "관리자 승인 대기중입니다.";
        status.style.color = "orange";
        return;
    }

    status.innerHTML = "접속 승인 완료. 이동합니다...";
    status.style.color = "lightgreen";

    setTimeout(()=>{
        window.location.href = "service.html"; // 실제 서비스 페이지
    },1500);
}

</script>

</body>
</html>
