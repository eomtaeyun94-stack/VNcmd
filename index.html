<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Access</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0c0f17;
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
    color:white;
}

/* 로그인 */
.login-container{
    width:100%;
    max-width:400px;
    padding:40px 25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}
.login-container h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:500;
}
.input-group{margin-bottom:18px}
.input-group input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:14px;
}
.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4e73ff,#6a5bff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
.login-btn:hover{
    opacity:0.85;
}

/* 로딩 화면 */
#loadingScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0c0f17;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.loader-circle{
    width:80px;
    height:80px;
    border:4px solid rgba(255,255,255,0.1);
    border-top:4px solid #6a5bff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

#progressText{
    font-size:14px;
    opacity:0.8;
}

/* CMD */
#cmd{
    position:absolute;
    width:100%;
    height:100%;
    background:#111319;
    color:#eaeaea;
    padding:25px;
    display:none;
    font-family:monospace;
}
#output{
    white-space:pre-line;
}
#commandInput{
    background:transparent;
    border:none;
    color:white;
    outline:none;
    width:100%;
}
</style>
</head>

<body>

<div class="login-container" id="loginBox">
    <h2>서비스 접속</h2>
    <div class="input-group">
        <input type="text" id="userId" placeholder="아이디">
    </div>
    <div class="input-group">
        <input type="password" id="userPw" placeholder="비밀번호">
    </div>
    <button class="login-btn" onclick="startSystem()">로그인</button>
</div>

<div id="loadingScreen">
    <div class="loader-circle"></div>
    <div id="progressText">Initializing system... 0%</div>
</div>

<div id="cmd">
    <div id="output">System Ready.</div>
    <br>
    C:\system> <input type="text" id="commandInput" autofocus>
</div>

<script>

// 🔐 허용된 계정 3개
const accounts = [
    { id: "seunghwan1127", pw: "123456789a" },
    { id: "giseok", pw: "giseok090413" },
    { id: "moonsun", pw: "nwnp" }   // ✅ 추가됨
];

function startSystem(){
    const inputId = document.getElementById("userId").value.trim();
    const inputPw = document.getElementById("userPw").value.trim();

    const valid = accounts.some(acc => 
        acc.id === inputId && acc.pw === inputPw
    );

    if(!valid){
        alert("아이디 또는 비밀번호가 틀렸습니다.");
        return;
    }

    document.getElementById("loginBox").style.display="none";
    const loading = document.getElementById("loadingScreen");
    loading.style.display="flex";

    let percent = 0;
    const text = document.getElementById("progressText");

    const interval = setInterval(()=>{
        percent += Math.floor(Math.random()*8)+3;
        if(percent >= 100){
            percent = 100;
            clearInterval(interval);
            text.innerText = "System Ready. 100%";

            setTimeout(()=>{
                loading.style.display="none";
                document.getElementById("cmd").style.display="block";
                document.getElementById("commandInput").focus();
            },800);
        }else{
            text.innerText = "Initializing system... " + percent + "%";
        }
    },200);
}

// CMD
const input = document.getElementById("commandInput");
const output = document.getElementById("output");

input.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        let cmd = input.value.trim();
        output.innerHTML += "\nC:\\system> " + cmd + "\n";
        
        if(cmd === "status"){
            output.innerHTML += "All services operational.\n";
        }else{
            output.innerHTML += "Unknown command.\n";
        }
        input.value="";
    }
});
</script>

</body>
</html>
