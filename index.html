<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flame Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Noto Sans KR',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
    overflow:hidden;
    color:#fff;
}

/* 🔥 배경 화염 효과 */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,
        rgba(255,120,0,.6) 0%,
        rgba(255,60,0,.4) 30%,
        rgba(255,0,0,.2) 50%,
        transparent 70%);
    filter:blur(120px);
    animation:flameMove 6s infinite alternate ease-in-out;
}

@keyframes flameMove{
    from{transform:translate(-50px,-30px) scale(1);}
    to{transform:translate(50px,30px) scale(1.2);}
}

/* 🔥 박스 제거 — 투명한 느낌 */
.page{
    width:380px;
    padding:40px;
    text-align:center;
}

/* 🔥 타오르는 제목 */
.panel-title{
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
    color:#ffae00;
    text-shadow:
        0 0 5px #ffae00,
        0 0 15px #ff4500,
        0 0 30px #ff0000;
}

.panel-sub{
    font-size:14px;
    color:#ffcc88;
    margin-bottom:30px;
    text-shadow:0 0 10px rgba(255,120,0,.6);
}

.input-wrap{
    margin-bottom:18px;
}

.inp{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,0.05);
    color:#fff;
    text-align:center;
    transition:.3s;
}

.inp:focus{
    outline:none;
    box-shadow:
        0 0 10px #ffae00,
        0 0 25px #ff4500;
}

/* 🔥 비번 일치 */
.match{
    box-shadow:
        0 0 10px #00ff88,
        0 0 20px #00ff88 !important;
}
.no-match{
    box-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000 !important;
}

.btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff4500,#ffae00);
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:
        0 0 10px #ff4500,
        0 0 25px #ff0000;
}
.btn-primary:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:
        0 0 20px #ffae00,
        0 0 40px #ff0000;
}

.switch-link{
    margin-top:20px;
    font-size:13px;
}
.switch-link span{
    color:#ffae00;
    cursor:pointer;
    text-shadow:0 0 10px #ff4500;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<!-- 로그인 -->
<div id="login-panel">
<div class="panel-title">로그인</div>
<div class="panel-sub">환영합니다</div>

<div class="input-wrap">
<input id="login-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="login-pw" class="inp" type="password" placeholder="비밀번호">
</div>

<button class="btn-primary" onclick="login()">로그인</button>

<div class="switch-link">
계정이 없으신가요? <span onclick="goTo('register')">회원가입</span>
</div>
</div>

<!-- 회원가입 -->
<div id="register-panel" class="hidden">
<div class="panel-title">회원가입</div>
<div class="panel-sub">관리자 키를 발급받으셨나요?</div>

<div class="input-wrap">
<input id="reg-name" class="inp" placeholder="이름">
</div>

<div class="input-wrap">
<input id="reg-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="reg-pw" class="inp" type="password" placeholder="비밀번호">
</div>

<div class="input-wrap">
<input id="reg-pw2" class="inp" type="password" placeholder="비밀번호 확인">
</div>

<button class="btn-primary" onclick="register()">가입하기</button>

<div class="switch-link">
이미 계정이 있으신가요? <span onclick="goTo('login')">로그인</span>
</div>
</div>

</div>

<script>

function goTo(type){
    document.getElementById("login-panel").classList.toggle("hidden", type!=="login");
    document.getElementById("register-panel").classList.toggle("hidden", type!=="register");
}

const pw1 = document.getElementById("reg-pw");
const pw2 = document.getElementById("reg-pw2");

pw2.addEventListener("input", ()=>{
    if(pw2.value === "") {
        pw2.classList.remove("match","no-match");
        return;
    }
    if(pw1.value === pw2.value){
        pw2.classList.add("match");
        pw2.classList.remove("no-match");
    }else{
        pw2.classList.add("no-match");
        pw2.classList.remove("match");
    }
});

function register(){
    if(reg-pw.value !== reg-pw2.value){
        alert("비밀번호가 일치하지 않습니다.");
        return;
    }
    alert("회원가입 완료!");
    goTo("login");
}

function login(){
    alert("로그인 기능은 데모입니다.");
}

</script>

</body>
</html>
