<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Access</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #0c1220, #05070c);
    font-family: 'Pretendard', sans-serif;
}

/* 로그인 카드 */
.login-container {
    width: 100%;
    max-width: 400px;
    padding: 40px 25px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* 제목 */
.login-container h2 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 30px;
    font-size: 24px;
    font-weight: 600;
}

/* 입력창 공통 */
.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #6a75ff;
}

/* 버튼 */
.login-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #5b6cff, #7a63ff);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>서비스 접속</h2>

    <div class="input-group">
        <input type="text" placeholder="아이디">
    </div>

    <div class="input-group">
        <input type="password" placeholder="비밀번호">
    </div>

    <button class="login-btn">로그인</button>
</div>

</body>
</html>
