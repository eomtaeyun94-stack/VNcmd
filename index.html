<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Noto Sans KR',sans-serif;
    background:linear-gradient(135deg,#1e1f29,#111);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}
.page{
    width:380px;
    background:#1a1b25;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    position:relative;
    overflow:hidden;
}
.panel-title{font-size:24px;font-weight:700;margin-bottom:8px}
.panel-sub{font-size:14px;color:#aaa;margin-bottom:25px}
.input-wrap{
    position:relative;
    margin-bottom:15px;
}
.inp{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2a2b38;
    color:#fff;
}
.inp:focus{outline:2px solid #5865f2}
.btn-primary{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#5865f2;
    color:#fff;
    cursor:pointer;
    margin-top:10px;
}
.btn-primary:hover{opacity:.9}
.switch-link{
    margin-top:15px;
    text-align:center;
    font-size:13px;
}
.switch-link span{
    color:#5865f2;
    cursor:pointer;
}
.field-error{
    color:#ff5c5c;
    font-size:12px;
    margin-bottom:10px;
}
.pw-toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
}
.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<!-- 로그인 -->
<div id="login-panel">
<div class="panel-title">로그인</div>
<div class="panel-sub">다시 만나서 반가워요</div>

<div class="input-wrap">
<input id="login-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="login-pw" class="inp" type="password" placeholder="비밀번호">
<button class="pw-toggle" onclick="togglePw('login-pw')">👁</button>
</div>

<div id="login-error" class="field-error hidden"></div>
<button class="btn-primary" onclick="login()">로그인</button>

<div class="switch-link">
계정이 없으신가요? <span onclick="goTo('register')">회원가입</span>
</div>
</div>

<!-- 회원가입 -->
<div id="register-panel" class="hidden">
<div class="panel-title">회원가입</div>
<div class="panel-sub">새 계정을 만들어보세요</div>

<div class="input-wrap">
<input id="reg-name" class="inp" placeholder="이름">
</div>

<div class="input-wrap">
<input id="reg-email" class="inp" type="email" placeholder="이메일">
</div>

<div class="input-wrap">
<input id="reg-pw" class="inp" type="password" placeholder="비밀번호">
<button class="pw-toggle" onclick="togglePw('reg-pw')">👁</button>
</div>

<div class="input-wrap">
<input id="reg-pw2" class="inp" type="password" placeholder="비밀번호 확인">
<button class="pw-toggle" onclick="togglePw('reg-pw2')">👁</button>
</div>

<div id="reg-error" class="field-error hidden"></div>
<button class="btn-primary" onclick="register()">가입하기</button>

<div class="switch-link">
이미 계정이 있으신가요? <span onclick="goTo('login')">로그인</span>
</div>
</div>

</div>

<script>
function goTo(type){
    document.getElementById("login-panel").classList.toggle("hidden", type!=="login");
    document.getElementById("register-panel").classList.toggle("hidden", type!=="register");
}

function togglePw(id){
    const input=document.getElementById(id);
    input.type=input.type==="password"?"text":"password";
}

function register(){
    const name=document.getElementById("reg-name").value;
    const email=document.getElementById("reg-email").value;
    const pw=document.getElementById("reg-pw").value;
    const pw2=document.getElementById("reg-pw2").value;
    const error=document.getElementById("reg-error");

    if(!name||!email||!pw){
        error.innerText="모든 항목을 입력하세요.";
        error.classList.remove("hidden");
        return;
    }
    if(pw!==pw2){
        error.innerText="비밀번호가 일치하지 않습니다.";
        error.classList.remove("hidden");
        return;
    }

    let users=JSON.parse(localStorage.getItem("users")||"[]");

    if(users.find(u=>u.email===email)){
        error.innerText="이미 존재하는 이메일입니다.";
        error.classList.remove("hidden");
        return;
    }

    users.push({name,email,pw});
    localStorage.setItem("users",JSON.stringify(users));
    alert("회원가입 완료!");
    goTo("login");
}

function login(){
    const email=document.getElementById("login-email").value;
    const pw=document.getElementById("login-pw").value;
    const error=document.getElementById("login-error");

    let users=JSON.parse(localStorage.getItem("users")||"[]");

    const user=users.find(u=>u.email===email && u.pw===pw);

    if(!user){
        error.innerText="이메일 또는 비밀번호가 올바르지 않습니다.";
        error.classList.remove("hidden");
        return;
    }

    alert(user.name+"님 환영합니다!");
}
</script>

</body>
</html>
